events {}

http {
  upstream huntunhou_backend {
    server huntunhou-backend:8000;
  }

  upstream foodwechatbot {
    server foodwechatbot:9000;
  }

  server {
    listen 80;
    server_name _;
    client_max_body_size 50m;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
      try_files /index.html =404;
    }

    location /assets/ {
      try_files $uri =404;
    }

    location /api/ {
      proxy_pass http://huntunhou_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /bot/ {
      rewrite ^/bot/(.*)$ /$1 break;
      proxy_pass http://foodwechatbot;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /wecom/ {
      proxy_pass http://foodwechatbot;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
